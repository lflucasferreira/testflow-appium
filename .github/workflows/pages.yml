name: Deploy Allure Report

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  report:
    name: Run Android smoke & publish Allure
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm install --no-audit --no-fund

      - name: Install Appium drivers
        run: npm run appium:drivers

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        env:
          CI: true
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: bash scripts/ci-android-smoke.sh
        continue-on-error: true

      - name: Build GitHub Pages site
        run: |
          mkdir -p site/report site/assets
          cp docs/index.html site/index.html
          cp -R docs/assets/. site/assets/
          if [ -f allure-report/index.html ]; then
            cp -R allure-report/. site/report/
          else
            echo '<!DOCTYPE html><html><body><h1>No Allure report generated</h1><p>Check workflow logs.</p></body></html>' > site/report/index.html
          fi
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-pages
          path: |
            allure-results/
            allure-report/
          if-no-files-found: ignore

  deploy:
    name: Deploy to GitHub Pages
    needs: report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
