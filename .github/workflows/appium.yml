name: Appium Mobile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  api:
    name: API — REST smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/cache@v5
        with:
          path: node_modules
          key: appium-${{ hashFiles('package-lock.json') }}

      - run: npm install --no-audit --no-fund

      - name: Run API suite
        env:
          API_BASE_URL: http://localhost:5050
          BASE_URL: http://localhost:5050
        run: npm run test:api

  android-smoke:
    name: Android — smoke (emulator)
    runs-on: ubuntu-latest
    needs: api
    timeout-minutes: 45
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v5
        with:
          path: node_modules
          key: appium-${{ hashFiles('package-lock.json') }}

      - run: npm install --no-audit --no-fund

      - name: Install Appium drivers
        run: npm run appium:drivers

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        env:
          CI: true
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: bash scripts/ci-android-smoke.sh

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: android-smoke-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload Allure artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-android-smoke
          path: |
            allure-results/
            allure-report/
          if-no-files-found: warn

  android-full:
    name: Android — full suite (emulator)
    runs-on: ubuntu-latest
    needs: api
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 180
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v5
        with:
          path: node_modules
          key: appium-${{ hashFiles('package-lock.json') }}

      - run: npm install --no-audit --no-fund

      - name: Install Appium drivers
        run: npm run appium:drivers

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        continue-on-error: true
        env:
          CI: true
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: bash scripts/ci-android-suite.sh

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: android-full-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload Allure artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-android-full
          path: |
            allure-results/
            allure-report/
          if-no-files-found: ignore

  publish:
    name: Build Allure report & publish GitHub Pages
    runs-on: ubuntu-latest
    needs: [api, android-smoke, android-full]
    if: >-
      always()
      && !cancelled()
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.android-smoke.result == 'success'
      && (needs.android-full.result == 'success'
        || needs.android-full.result == 'failure'
        || needs.android-full.result == 'skipped')
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm install --no-audit --no-fund

      - name: Download Allure artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: allure-results-*
          path: ci-artifacts

      - name: Consolidate Allure artifacts
        run: |
          ls -la ci-artifacts || true
          find ci-artifacts -maxdepth 3 -type d 2>/dev/null || true
          bash scripts/consolidate-allure-artifacts.sh

      - name: Prepare Allure report for Pages
        run: bash scripts/prepare-allure-for-pages.sh

      - name: Build GitHub Pages site
        env:
          REQUIRE_ALLURE_REPORT: true
        run: bash scripts/build-pages-site.sh

      - name: Verify Allure report in Pages site
        run: |
          test -f site/report/index.html
          test "$(wc -c < site/report/index.html | tr -d ' ')" -gt 500
          grep -qv "No Allure report generated" site/report/index.html
          echo "Allure report verified in site/report/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report-pages
          path: |
            allure-report/
            allure-results/
            site/report/
          if-no-files-found: ignore

  deploy:
    name: Deploy to GitHub Pages
    needs: publish
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
