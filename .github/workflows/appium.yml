name: Appium Mobile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: API — REST smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/cache@v5
        with:
          path: node_modules
          key: appium-${{ hashFiles('package-lock.json') }}

      - run: npm install --no-audit --no-fund

      - name: Run API suite
        env:
          API_BASE_URL: http://localhost:5050
          BASE_URL: http://localhost:5050
        run: npm run test:api

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-api
          path: allure-results/
          if-no-files-found: ignore

  android:
    name: Android — ${{ github.event_name == 'pull_request' && 'smoke' || 'full suite' }} (emulator)
    runs-on: ubuntu-latest
    needs: api
    timeout-minutes: ${{ github.event_name == 'pull_request' && 45 || 180 }}
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v5
        with:
          path: node_modules
          key: appium-${{ hashFiles('package-lock.json') }}

      - run: npm install --no-audit --no-fund

      - name: Install Appium drivers
        run: npm run appium:drivers

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        continue-on-error: ${{ github.event_name == 'push' }}
        env:
          CI: true
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: |
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              bash scripts/ci-android-smoke.sh
            else
              bash scripts/ci-android-suite.sh
            fi

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: android-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-android
          path: allure-results/
          if-no-files-found: ignore

  publish:
    name: Build Allure report & publish GitHub Pages
    runs-on: ubuntu-latest
    needs: [api, android]
    if: >-
      always()
      && !cancelled()
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && (needs.api.result == 'success' || needs.api.result == 'failure')
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm install --no-audit --no-fund

      - name: Download Allure results
        uses: actions/download-artifact@v7
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results
        continue-on-error: true

      - name: Generate Allure report
        run: npm run allure:generate
        continue-on-error: true

      - name: Build GitHub Pages site
        run: bash scripts/build-pages-site.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report-pages
          path: |
            allure-report/
            allure-results/
            site/report/
          if-no-files-found: ignore

  deploy:
    name: Deploy to GitHub Pages
    needs: publish
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
