name: Appium Mobile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — REST smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: actions/cache@v5
        with:
          path: node_modules
          key: appium-${{ hashFiles('package-lock.json') }}

      - run: npm install --no-audit --no-fund

      - name: Run API suite
        env:
          API_BASE_URL: http://localhost:5050
          BASE_URL: http://localhost:5050
        run: npm run test:api

  android-smoke:
    name: Android — smoke (emulator)
    runs-on: ubuntu-latest
    needs: api
    timeout-minutes: 45
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v5
        with:
          path: node_modules
          key: appium-${{ hashFiles('package-lock.json') }}

      - run: npm install --no-audit --no-fund

      - name: Install Appium drivers
        run: npm run appium:drivers

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        env:
          CI: true
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: bash scripts/ci-android-smoke.sh

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: android-smoke-screenshots
          path: screenshots/
          if-no-files-found: ignore
