<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TestFlow Appium — QA Hub</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --accent: #38bdf8;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(160deg, #020617, #0f172a 45%, #172554);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main {
      width: min(720px, 100%);
      background: rgba(30, 41, 59, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.75rem; }
    p { color: var(--muted); line-height: 1.6; }
    .links { display: grid; gap: 0.75rem; margin-top: 1.5rem; }
    a {
      display: block;
      padding: 0.9rem 1rem;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.8);
      color: var(--accent);
      text-decoration: none;
      border: 1px solid rgba(56, 189, 248, 0.25);
      font-weight: 600;
    }
    a:hover { background: rgba(56, 189, 248, 0.12); }
    code {
      background: rgba(15, 23, 42, 0.9);
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <main>
    <h1>TestFlow Appium</h1>
    <p>
      Mobile web automation suite for <strong>TestFlow</strong> using Appium 2 + WebdriverIO.
      The latest smoke run report is published below after each push to <code>main</code>.
    </p>
    <div class="links">
      <a href="./report/index.html">Allure Report — Android smoke</a>
      <a href="https://github.com/lflucasferreira/testflow-appium">GitHub repository</a>
      <a href="https://github.com/qaschoolbr/testflow">TestFlow sandbox app</a>
    </div>
  </main>
</body>
</html>
